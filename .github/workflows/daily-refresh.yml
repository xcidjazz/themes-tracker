name: Daily price refresh

# Runs every day at 22:00 UTC (~6pm EST / 5pm EDT — a couple hours after US market close).
# Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

# Permission to commit back to the repo
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh prices
        run: python refresh_prices.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git add index.html
            git commit -m "auto: refresh prices $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed updated prices"
          else
            echo "No changes to commit"
          fi
